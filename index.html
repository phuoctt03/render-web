<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Preview Tool</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background:#f5f5f5;
}

.container{
  max-width:1200px;
  margin:auto;
}

textarea{
  width:100%;
  height:200px;
  padding:10px;
  font-family:monospace;
  font-size:14px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  margin-top:10px;
  padding:10px 16px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

iframe{
  margin-top:20px;
  width:100%;
  height:500px;
  border:1px solid #ccc;
  border-radius:6px;
  background:white;
}
</style>
</head>

<body>

<div class="container">

<h2>HTML Preview</h2>

<textarea id="htmlInput" placeholder="Paste HTML code here..."></textarea>

<br>
<button onclick="render()">Render</button>

<iframe id="preview"></iframe>

</div>

<script>
function render(){
  const html = document.getElementById("htmlInput").value;
  document.getElementById("preview").srcdoc = html;
}
</script>

</body>
</html>
